# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: bkt2gh

before:
  hooks:
    - go mod tidy

builds:
  - id: bkt2gh
    main: ./cmd/bkt2gh
    binary: bkt2gh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: bkt2gh
    ids:
      - bkt2gh
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc

homebrew_casks:
  - name: bkt2gh
    ids:
      - bkt2gh
    binaries:
      - bkt2gh
    repository:
      owner: ludens
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/ludens/bkt-to-gh"
    description: "CLI for migrating Bitbucket Cloud repositories to GitHub"
    caveats: |
      Run `bkt2gh configure` before your first migration.
